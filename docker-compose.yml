services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: glms-sql-server-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "GLMS_Part3!2026"
    ports:
      - "14333:1433"
    volumes:
      - glms-sql-data:/var/opt/mssql
    networks:
      - glms-network

  glms-backend-api:
    build:
      context: .
      dockerfile: GLMS.Api/Dockerfile
    container_name: glms-backend-api
    depends_on:
      - sql-server-db
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sql-server-db,1433;Database=GLMSDb;User Id=sa;Password=GLMS_Part3!2026;TrustServerCertificate=True;MultipleActiveResultSets=true"
      JwtSettings__Issuer: "GLMS.Api"
      JwtSettings__Audience: "GLMS.Mvc"
      JwtSettings__Key: "GLMS-Part3-Super-Secret-Key-For-Local-Development-Only-12345"
      JwtSettings__Username: "admin"
      JwtSettings__Password: "Password123!"
    ports:
      - "8081:8080"
    networks:
      - glms-network

  glms-frontend-web:
    build:
      context: .
      dockerfile: GLMS/Dockerfile
    container_name: glms-frontend-web
    depends_on:
      - glms-backend-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ApiSettings__BaseUrl: "http://glms-backend-api:8080/"
      ApiAuth__Username: "admin"
      ApiAuth__Password: "Password123!"
    ports:
      - "8080:8080"
    networks:
      - glms-network

volumes:
  glms-sql-data:

networks:
  glms-network:
    driver: bridge